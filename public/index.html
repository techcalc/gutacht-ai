<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GutachtAI - Mobiler Rekorder</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .pulse { animation: pulse-animation 1.5s infinite; }
        @keyframes pulse-animation {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col justify-between p-4">

    <header class="text-center py-4">
        <h1 class="text-3xl font-black tracking-wider text-blue-400">GutachtAI</h1>
        <p class="text-xs text-slate-400 mt-1">Mängelaufnahme &amp; KI-Strukturierung</p>
    </header>

    <main class="max-w-md w-full mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-6 shadow-2xl">
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Projekt-ID / Name</label>
                <input type="text" id="projectId" value="" placeholder="z.B. neubau-stuttgart" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-blue-500 font-mono">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Bauteil / Bereich (z.B. Keller, OG Bad)</label>
                <input type="text" id="roomOrSection" placeholder="z.B. Wohnzimmer EG" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-blue-500">
            </div>
        </div>

        <div class="flex flex-col items-center justify-center py-6 space-y-3">
            <button id="recordBtn" class="w-24 h-24 bg-red-600 hover:bg-red-700 text-white rounded-full flex items-center justify-center text-3xl shadow-lg transition-all active:scale-95 cursor-pointer">🎤</button>
            <p id="statusText" class="text-sm font-medium text-slate-400">Bereit zur Aufnahme</p>
            <div id="timer" class="text-xs font-mono text-slate-500 hidden">00:00</div>
        </div>

        <div id="responseContainer" class="hidden border rounded-xl p-4 text-sm">
            <p id="responseText"></p>
        </div>
    </main>

    <footer class="text-center text-[10px] text-slate-600 py-2">GutachtAI · läuft auf eurem Server</footer>

    <script>
        // Gleiche Origin -> kein hardcoded IP, kein CORS, kein Mixed-Content (http/https) Problem.
        const BACKEND_URL = "";
        const TEST_USER_ID = "00000000-0000-0000-0000-000000000000";

        let mediaRecorder, audioChunks = [], isRecording = false, timerInterval, seconds = 0, recMime = "audio/webm";

        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('statusText');
        const timerDisplay = document.getElementById('timer');
        const responseContainer = document.getElementById('responseContainer');
        const responseText = document.getElementById('responseText');

        // Projekt-ID merken (localStorage), damit man sie nicht jedes Mal tippt
        const projInput = document.getElementById('projectId');
        projInput.value = localStorage.getItem('gutachtai_project') || "";
        projInput.addEventListener('change', () => localStorage.setItem('gutachtai_project', projInput.value.trim()));

        // Vom Browser unterstütztes Aufnahmeformat wählen (Gemini frisst webm/ogg/mp4)
        function pickMime() {
            const candidates = ["audio/webm;codecs=opus", "audio/webm", "audio/ogg;codecs=opus", "audio/mp4"];
            for (const c of candidates) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c;
            }
            return "";
        }

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const chosen = pickMime();
                    mediaRecorder = chosen ? new MediaRecorder(stream, { mimeType: chosen }) : new MediaRecorder(stream);
                    recMime = mediaRecorder.mimeType || chosen || "audio/webm";
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = async () => {
                        const baseMime = recMime.split(';')[0]; // "audio/webm;codecs=opus" -> "audio/webm"
                        const audioBlob = new Blob(audioChunks, { type: baseMime });
                        await sendAudioToServer(audioBlob, baseMime);
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.innerText = "🛑";
                    recordBtn.classList.add('pulse');
                    statusText.innerText = "Ich höre zu... Sprechen Sie jetzt.";
                    statusText.classList.remove('text-slate-400'); statusText.classList.add('text-red-400');

                    seconds = 0; timerDisplay.classList.remove('hidden');
                    timerInterval = setInterval(() => {
                        seconds++;
                        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
                        const s = String(seconds % 60).padStart(2, '0');
                        timerDisplay.innerText = `${m}:${s}`;
                    }, 1000);
                } catch (err) {
                    alert('Mikrofon-Zugriff verweigert oder nicht verfügbar!');
                    console.error(err);
                }
            } else {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
                isRecording = false;
                recordBtn.innerText = "🎤"; recordBtn.classList.remove('pulse');
                statusText.innerText = "Übertrage an KI...";
                statusText.classList.remove('text-red-400'); statusText.classList.add('text-blue-400');
                clearInterval(timerInterval); timerDisplay.classList.add('hidden');
            }
        });

        async function sendAudioToServer(blob, mime) {
            const projectId = projInput.value.trim();
            const roomOrSection = document.getElementById('roomOrSection').value;

            if (!projectId) {
                alert('Bitte gib eine Projekt-ID an!');
                statusText.innerText = "Bereit zur Aufnahme";
                return;
            }

            const ext = mime.includes('ogg') ? 'ogg' : mime.includes('mp4') ? 'm4a' : 'webm';
            const formData = new FormData();
            formData.append('audio', blob, 'aufnahme.' + ext);
            formData.append('projectId', projectId);
            formData.append('userId', TEST_USER_ID);
            formData.append('roomOrSection', roomOrSection || 'Allgemein');

            try {
                const response = await fetch(`${BACKEND_URL}/api/process-audio`, { method: 'POST', body: formData });
                const result = await response.json();
                responseContainer.classList.remove('hidden');

                if (result.success) {
                    responseContainer.className = "border-emerald-800 bg-emerald-950/50 rounded-xl p-4 text-sm text-emerald-400";
                    responseText.innerText = "✅ Befund erfolgreich übermittelt und strukturiert!";
                    statusText.innerText = "Erfolgreich gesendet!"; statusText.className = "text-sm font-medium text-emerald-400";
                    document.getElementById('roomOrSection').value = '';
                } else {
                    responseContainer.className = "border-red-800 bg-red-950/50 rounded-xl p-4 text-sm text-red-400";
                    responseText.innerText = "❌ Fehler: " + (result.error || "Unbekannt");
                    statusText.innerText = "Fehler beim Senden"; statusText.className = "text-sm font-medium text-red-400";
                }
            } catch (error) {
                responseContainer.classList.remove('hidden');
                responseContainer.className = "border-red-800 bg-red-950/50 rounded-xl p-4 text-sm text-red-400";
                responseText.innerText = "❌ Netzwerkfehler – erreicht der Server die API?";
                console.error(error);
            }
        }
    </script>
</body>
</html>
